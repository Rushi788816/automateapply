services:
  - type: web
    name: automateapply-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: automateapply-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_SECRET
        generateValue: true
      - key: AUTOMATION_API_KEY
        generateValue: true
      - key: N8N_WEBHOOK_URL
        sync: false

databases:
  - name: automateapply-db
    plan: free
